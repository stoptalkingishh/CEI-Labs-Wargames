name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install PyYAML==6.0.2
      - run: python -m compileall -q scripts targets
      - run: python scripts/build_bandit.py
      - run: python scripts/build_krypton.py
      - run: python scripts/build_natas.py
      - run: python scripts/validate_game_stages.py
      - run: python scripts/validate_generated.py --output validation-manifest.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: validation-manifest
          path: validation-manifest.json
          if-no-files-found: error
