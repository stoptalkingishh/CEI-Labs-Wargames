name: Build immutable target images

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: "Approved Engine base image as name@sha256:digest"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bandit, krypton, natas]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Require immutable base image
        env:
          BASE_IMAGE: ${{ inputs.base_image }}
        run: |
          if ! printf '%s' "$BASE_IMAGE" | grep -Eq '^[^[:space:]@]+@sha256:[0-9a-f]{64}$'; then
            echo 'base_image must be an immutable name@sha256:digest reference' >&2
            exit 1
          fi
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
      - uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: targets/${{ matrix.target }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cei-labs-wargames/${{ matrix.target }}-target:sha-${{ github.sha }}
          build-args: BASE_IMAGE=${{ inputs.base_image }}
          sbom: true
          provenance: mode=max
